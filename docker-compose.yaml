services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backstage"]
      interval: 5s
      timeout: 5s
      retries: 5

  backstage:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      APP_CONFIG_app_baseUrl: "http://localhost:4180"
      APP_CONFIG_backend_baseUrl: "http://localhost:4180"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    depends_on:
      - backstage
    ports:
      - "4180:4180"
    volumes:
      - ./dev/htpasswd:/etc/oauth2-proxy/htpasswd:ro
    command:
      - --provider=google
      - --htpasswd-file=/etc/oauth2-proxy/htpasswd
      - --upstream=http://backstage:7007
      - --http-address=0.0.0.0:4180
      - --cookie-secret=gqg1m4GSb70A45OYf7BtjPeIIEdJ9eM3
      - --cookie-secure=false
      - --email-domain=*
      - --set-xauthrequest=true
      - --client-id=unused
      - --client-secret=unused

volumes:
  postgres-data:
